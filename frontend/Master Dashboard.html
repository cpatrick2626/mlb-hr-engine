:root {
  /* ===========================================================
     COLORS — BASE PALETTE
     The system is built on near-black surfaces with two reactive
     accent rails (green = advantage / live / hit, red = danger /
     cold / pitcher-favored) and a single cool electric blue.
     =========================================================== */

  /* Surfaces (darkest -> lightest) */
  --bg-void:        #04070a;   /* page void, outside cards */
  --bg-base:        #0a1014;   /* primary panel background */
  --bg-raised:      #0e1519;   /* raised card / inset table */
  --bg-elevated:    #131b21;   /* hover, secondary chips */
  --bg-overlay:     rgba(8, 12, 16, 0.78);

  /* Foreground / text */
  --fg-1:           #f1f5f3;   /* primary text, player names */
  --fg-2:           #b8c2c0;   /* secondary text, labels */
  --fg-3:           #6b7872;   /* tertiary, captions, axis */
  --fg-4:           #3a4642;   /* disabled, subtle dividers */

  /* Borders */
  --border-1:       rgba(180, 220, 200, 0.08);   /* hairline */
  --border-2:       rgba(180, 220, 200, 0.16);   /* card edge */
  --border-strong:  rgba(180, 220, 200, 0.32);

  /* ===========================================================
     ACCENT RAILS — the two-tone heart of HR Engine
     =========================================================== */

  /* GREEN — advantage, live, hit, batter favored */
  --green-100:      #d9ffe9;
  --green-300:      #6dffae;
  --green-500:      #1aff66;   /* core neon green */
  --green-600:      #14e858;
  --green-700:      #0eb845;
  --green-glow:     rgba(26, 255, 102, 0.55);
  --green-glow-soft:rgba(26, 255, 102, 0.18);

  /* RED — danger, cold, pitcher favored, miss */
  --red-100:        #ffdfe2;
  --red-300:        #ff8a93;
  --red-500:        #ff3344;   /* core neon red */
  --red-600:        #e8202f;
  --red-700:        #b3151f;
  --red-glow:       rgba(255, 51, 68, 0.55);
  --red-glow-soft:  rgba(255, 51, 68, 0.18);

  /* CYAN — secondary, neutral data, focus rings */
  --cyan-300:       #7ce8ff;
  --cyan-500:       #00d9ff;
  --cyan-glow:      rgba(0, 217, 255, 0.45);

  /* BLUE — SIGNAL tier, informational accents */
  --blue-300:       #7ea8ff;
  --blue-500:       #3b6fff;
  --blue-600:       #2f5ae0;
  --blue-glow:      rgba(59, 111, 255, 0.45);

  /* AMBER — warning, mid-tier, neutral matchup */
  --amber-500:      #ffb020;
  --amber-glow:     rgba(255, 176, 32, 0.4);

  /* ===========================================================
     SEMANTIC COLORS
     =========================================================== */
  --color-bg:           var(--bg-base);
  --color-bg-panel:     var(--bg-raised);
  --color-bg-inset:     var(--bg-elevated);

  --color-fg:           var(--fg-1);
  --color-fg-muted:     var(--fg-2);
  --color-fg-subtle:    var(--fg-3);

  --color-border:       var(--border-2);
  --color-border-hair:  var(--border-1);

  --color-accent:       var(--green-500);
  --color-accent-glow:  var(--green-glow);
  --color-danger:       var(--red-500);
  --color-danger-glow:  var(--red-glow);
  --color-info:         var(--cyan-500);
  --color-warn:         var(--amber-500);

  --color-live:         var(--green-500);   /* live dot, in-game */
  --color-positive:     var(--green-500);   /* good stat */
  --color-negative:     var(--red-500);     /* bad stat */
  --color-neutral:      var(--cyan-500);    /* neutral data */

  /* Heatmap ramp — cold (pitcher) → neutral → hot (batter) */
  --heat-cold:          #2a0a10;
  --heat-cool:          #6a1622;
  --heat-mid:           #2a1e1a;
  --heat-warm:          #0e3a20;
  --heat-hot:           #14c451;

  /* ===========================================================
     TYPE
     =========================================================== */
  --font-display: "Barlow Condensed", "Oswald", "Impact", sans-serif;
  --font-body:    "Barlow", "Inter", system-ui, sans-serif;
  --font-mono:    "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;

  /* Type scale — tuned for stat-dense dashboards */
  --t-hero:       64px;   /* huge numbers like "+18%", "+280" */
  --t-display:    32px;   /* player names */
  --t-h1:         24px;   /* panel titles */
  --t-h2:         18px;   /* section titles */
  --t-h3:         14px;   /* table headers, eyebrows */
  --t-body:       14px;   /* body */
  --t-small:      12px;   /* secondary */
  --t-micro:      11px;   /* axis labels, footnotes */
  --t-stat-lg:    28px;   /* big stat number */
  --t-stat:       16px;   /* table stat number */

  /* Letter spacing — condensed display loves wide tracking */
  --tracking-wide:    0.08em;   /* eyebrows, labels */
  --tracking-wider:   0.14em;   /* section dividers */
  --tracking-widest:  0.2em;    /* tiny ALL-CAPS like "LIVE" */
  --tracking-tight:   -0.01em;  /* hero numbers */

  /* Line heights */
  --lh-tight:     1.05;
  --lh-snug:      1.2;
  --lh-normal:    1.4;

  /* ===========================================================
     SPACING — 4px base
     =========================================================== */
  --space-0:   0;
  --space-1:   4px;
  --space-2:   8px;
  --space-3:   12px;
  --space-4:   16px;
  --space-5:   20px;
  --space-6:   24px;
  --space-8:   32px;
  --space-10:  40px;
  --space-12:  48px;
  --space-16:  64px;

  /* ===========================================================
     RADII — sharp, terminal-flavored
     =========================================================== */
  --r-none:    0;
  --r-xs:      2px;
  --r-sm:      4px;
  --r-md:      6px;     /* default card */
  --r-lg:      10px;
  --r-pill:    999px;

  /* ===========================================================
     SHADOWS / GLOWS
     These define the brand. Glows are how panels feel "live".
     =========================================================== */
  --shadow-card:        0 1px 0 rgba(255,255,255,0.04) inset,
                        0 0 0 1px var(--border-2),
                        0 24px 48px -24px rgba(0,0,0,0.7);
  --shadow-inset:       inset 0 0 0 1px var(--border-1),
                        inset 0 1px 0 rgba(255,255,255,0.02);

  --glow-green-sm:      0 0 0 1px var(--green-500),
                        0 0 12px var(--green-glow-soft);
  --glow-green-md:      0 0 0 1px var(--green-500),
                        0 0 24px var(--green-glow),
                        inset 0 0 16px var(--green-glow-soft);
  --glow-green-lg:      0 0 0 1.5px var(--green-500),
                        0 0 40px var(--green-glow),
                        inset 0 0 24px var(--green-glow-soft);

  --glow-red-sm:        0 0 0 1px var(--red-500),
                        0 0 12px var(--red-glow-soft);
  --glow-red-md:        0 0 0 1px var(--red-500),
                        0 0 24px var(--red-glow),
                        inset 0 0 16px var(--red-glow-soft);

  --glow-cyan-sm:       0 0 0 1px var(--cyan-500),
                        0 0 12px var(--cyan-glow);

  /* Text glow — for hero numbers and LIVE indicators */
  --text-glow-green:    0 0 8px var(--green-glow), 0 0 24px var(--green-glow-soft);
  --text-glow-red:      0 0 8px var(--red-glow),   0 0 24px var(--red-glow-soft);

  /* ===========================================================
     MOTION
     =========================================================== */
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-snap:   cubic-bezier(0.5, 1.6, 0.4, 1);  /* slight overshoot for stat reveals */
  --dur-fast:    120ms;
  --dur-base:    200ms;
  --dur-slow:    360ms;
  --dur-pulse:   1800ms;   /* LIVE dot heartbeat */
}

/* ============================================================
   SEMANTIC ELEMENT STYLES
   ============================================================ */

body {
  background: var(--bg-void);
  color: var(--fg-1);
  font-family: var(--font-body);
  font-size: var(--t-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
}

.eyebrow,
.label {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--t-h3);
  text-transform: uppercase;
  letter-spacing: var(--tracking-wide);
  color: var(--fg-2);
}

h1, .h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: var(--t-h1);
  text-transform: uppercase;
  letter-spacing: var(--tracking-wide);
  color: var(--fg-1);
  line-height: var(--lh-tight);
}

h2, .h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--t-h2);
  text-transform: uppercase;
  letter-spacing: var(--tracking-wide);
  color: var(--fg-1);
}

h3, .h3 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--t-h3);
  text-transform: uppercase;
  letter-spacing: var(--tracking-wider);
  color: var(--fg-2);
}

.display {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: var(--t-display);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  line-height: var(--lh-tight);
}

.hero-stat {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: var(--t-hero);
  letter-spacing: var(--tracking-tight);
  line-height: 1;
}

.hero-stat--green { color: var(--green-500); text-shadow: var(--text-glow-green); }
.hero-stat--red   { color: var(--red-500);   text-shadow: var(--text-glow-red); }

.stat-num {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  font-size: var(--t-stat);
}

.code, code, pre {
  font-family: var(--font-mono);
  font-size: var(--t-small);
}

p {
  font-family: var(--font-body);
  font-size: var(--t-body);
  color: var(--fg-2);
  line-height: var(--lh-normal);
}

.caption {
  font-size: var(--t-micro);
  color: var(--fg-3);
  letter-spacing: 0.04em;
}

/* ============================================================
   UTILITIES — the building blocks of HR Engine UI
   ============================================================ */

.panel {
  background: var(--bg-raised);
  border: 1px solid var(--border-2);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-card);
}

.panel--green { box-shadow: var(--glow-green-md); border-color: transparent; }
.panel--red   { box-shadow: var(--glow-red-md);   border-color: transparent; }
.panel--cyan  { box-shadow: var(--glow-cyan-sm);  border-color: transparent; }

.live-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: var(--r-pill);
  background: var(--green-500);
  box-shadow: 0 0 8px var(--green-glow), 0 0 2px #fff;
  animation: hr-pulse var(--dur-pulse) var(--ease-in-out) infinite;
}
@keyframes hr-pulse {
  0%, 100% { opacity: 1;   transform: scale(1); }
  50%      { opacity: 0.55; transform: scale(0.85); }
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-void);
  color: var(--fg-1);

}

.hr-app {

  max-width: 1440px;

/* =================================
   HEADER
   ================================= */
.hr-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 16px;
  background: linear-gradient(180deg, rgba(8,12,16,0.85), rgba(8,12,16,0.6));
  backdrop-filter: blur(10px);
  border: 1px solid rgba(180,220,200,0.08);
  border-radius: 6px;
}

.hr-header__logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.02em;
  line-height: 1;
  display: flex;
  align-items: baseline;
}

.hr-header__divider {
  width: 1px;
  align-self: stretch;
  background: rgba(180,220,200,0.14);
}

.hr-header__subtitle {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #6b7872;
  text-transform: uppercase;
}

.hr-header__status {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
}
.hr-header__live {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #1aff66;
  font-family: var(--font-display);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 11px;
}
.hr-header__sep { color: rgba(180,220,200,0.2); }

.hr-header__controls {
  display: flex;
  gap: 8px;
}

.hr-btn {
  background: transparent;
  border: 1px solid rgba(180,220,200,0.16);
  color: var(--fg-1);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  line-height: 1;
  transition: all var(--dur-fast) var(--ease-out);
}
.hr-btn:hover {
  background: var(--bg-elevated);
  border-color: rgba(180,220,200,0.32);
}
.hr-btn.is-active {
  background: rgba(26,255,102,0.08);
  border-color: rgba(26,255,102,0.5);
  color: #1aff66;
}

/* =================================
   AT-BAT QUEUE
   ================================= */
.hr-queue {
  display: grid;
  grid-template-columns: 1fr repeat(5, 1.4fr) 1.6fr;
  gap: 8px;
}
.hr-slot {
  position: relative;
  padding: 8px 12px 10px;
  background: var(--bg-raised);
  border: 1px solid rgba(180,220,200,0.08);
  border-radius: 6px;
  text-align: left;
  color: var(--fg-1);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  min-height: 64px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  font-family: var(--font-body);
}
.hr-slot:hover {
  background: var(--bg-elevated);
  border-color: rgba(180,220,200,0.2);
}
.hr-slot--active {
  background: linear-gradient(180deg, rgba(26,255,102,0.06), transparent 60%), var(--bg-raised);
  border-color: transparent;
  box-shadow: 0 0 0 1px rgba(26,255,102,0.5), 0 0 16px rgba(26,255,102,0.25);
}
.hr-slot--inning {
  background: linear-gradient(180deg, rgba(26,255,102,0.08), transparent 70%), var(--bg-raised);
  border-color: transparent;
  box-shadow: 0 0 0 1px rgba(26,255,102,0.4);
  cursor: default;
}
.hr-slot__idx {
  position: absolute;
  top: 8px;
  left: 12px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  color: var(--fg-3);
}
.hr-slot__name {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--fg-1);
  margin-top: 10px;
}
.hr-slot--inning .hr-slot__name { margin-top: 0; }
.hr-slot__team {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
}
.hr-slot__due {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 4px;
}
.hr-slot__hr {
  position: absolute;
  top: 8px;
  right: 12px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 13px;
  color: #1aff66;
  letter-spacing: 0.04em;
  text-shadow: 0 0 8px rgba(26,255,102,0.4);
}

/* =================================

   ================================= */
.hr-main {

  grid-template-columns: 1.1fr 1.2fr 1.1fr 0.85fr;

}

/* =================================

    radial-gradient(900px 500px at 50% 45%, rgba(0,217,255,0.04), transparent 70%),
    var(--bg-base);
  box-shadow: inset 0 0 0 1px var(--border-1);
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
/* corner brackets */
.md-stage__corner {
  display: none;
  position: absolute;
  width: 26px; height: 26px;
  border: 2px solid rgba(0,217,255,0.35);
  z-index: 6;
  pointer-events: none;
}
.md-stage__corner--tl { top: 12px; left: 12px;  border-right: 0; border-bottom: 0; }
.md-stage__corner--tr { top: 12px; right: 12px; border-left: 0;  border-bottom: 0; }
.md-stage__corner--bl { bottom: 12px; left: 12px;  border-right: 0; border-top: 0; }
.md-stage__corner--br { bottom: 12px; right: 12px; border-left: 0;  border-top: 0; }

.md-stage__body {
  flex: 1;
  min-height: 0;
  overflow: auto;
  position: relative;
}
.md-stage__body::-webkit-scrollbar { width: 10px; height: 10px; }
.md-stage__body::-webkit-scrollbar-thumb { background: rgba(180,220,200,0.16); border-radius: 6px; }
.md-stage__body::-webkit-scrollbar-track { background: transparent; }

/* room content frame */
.md-room {
  padding: 18px 20px 22px;
  min-height: 100%;
}
.md-room__head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}
.md-room__titles { display: flex; flex-direction: column; gap: 4px; }
.md-room__eyebrow {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--fg-3);
  white-space: nowrap;
}
.md-room__title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 26px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--fg-1);
  line-height: 1;
}
.md-room__meta {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
}
.md-room__chips { display: flex; gap: 8px; }
.md-room__chip {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: var(--r-sm);
  background: var(--bg-elevated);
  color: var(--fg-2);
  box-shadow: inset 0 0 0 1px var(--border-2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.md-room__chip:hover { color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--border-strong); }
.md-room__chip.is-on {
  background: rgba(0,217,255,0.08);
  color: var(--cyan-300);
  box-shadow: inset 0 0 0 1px rgba(0,217,255,0.45);
}
.md-room__fbadge {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--green-500);
  padding: 4px 9px;
  border-radius: var(--r-pill);
  background: rgba(26,255,102,0.08);
  box-shadow: inset 0 0 0 1px rgba(26,255,102,0.45);
  white-space: nowrap;
}
.md-room__clear {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-3);
  background: transparent;
  border: 1px solid var(--border-2);
  padding: 4px 9px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.md-room__clear:hover { color: var(--red-300); border-color: rgba(255,51,68,0.5); }

/* ---- radar placeholder (default room body) ---- */
.md-radar {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.md-radar__svg { width: min(82%, 720px); height: auto; opacity: 0.9; }
.md-radar__sweep {
  transform-origin: 400px 400px;
  animation: md-sweep 6s linear infinite;
}
@keyframes md-sweep { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
.md-radar__caption {
  position: absolute;
  left: 50%;
  bottom: 13%;
  transform: translateX(-50%);
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.md-radar__room {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 30px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-1);
}
.md-radar__room .accent { color: var(--cyan-500); }
.md-radar__status {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--fg-3);
  display: inline-flex;
  gap: 8px;
  align-items: center;
}
.md-radar__status::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan-500); box-shadow: 0 0 8px var(--cyan-glow);
  animation: hr-pulse 1.8s ease-in-out infinite;
}

/* ============================================================
   3 — RIGHT RAIL : NAVIGATION PANEL
   ============================================================ */
.md-nav {
  background: var(--bg-base);
  border: 1px solid var(--border-1);
  border-radius: var(--r-md);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.md-nav__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--green-500);
  margin-bottom: 2px;
  padding-left: 2px;
}
.md-eng {
  display: flex;
  flex-direction: column;
}
.md-eng__btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--border-1);
  border-radius: var(--r-md);
  cursor: pointer;
  text-align: left;
  width: 100%;
  font-family: var(--font-body);
  transition: all var(--dur-fast) var(--ease-out);
}
.md-eng__btn:hover {
  background: var(--bg-elevated);
  border-color: var(--border-strong);
}
.md-eng__btn.is-active {
  border-color: transparent;
  box-shadow: 0 0 0 1.5px var(--eng-color, var(--green-500)), 0 0 16px var(--eng-glow, rgba(26,255,102,0.18));
  background: linear-gradient(180deg, var(--eng-tint, rgba(26,255,102,0.05)), transparent 80%), var(--bg-raised);
}
.md-eng__ic {
  width: 34px; height: 34px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--eng-color, var(--green-500));
  background: color-mix(in srgb, var(--eng-color, #1aff66) 8%, transparent);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--eng-color, #1aff66) 28%, transparent);
}
.md-eng__meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.md-eng__name {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-1);
  line-height: 1;
}
.md-eng__name .soft { color: var(--fg-3); font-weight: 700; }
.md-eng__desc {
  font-family: var(--font-body);
  font-size: 11px;
  line-height: 1.25;
  color: var(--fg-3);
}
.md-eng__chev {
  color: var(--fg-3);
  flex-shrink: 0;
  transition: transform var(--dur-base) var(--ease-out), color var(--dur-fast);
}
.md-eng__btn.is-active .md-eng__chev { color: var(--eng-color, var(--green-500)); }
.md-eng__btn.is-open .md-eng__chev { transform: rotate(90deg); }

/* sub-lens list */
.md-subs {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows var(--dur-base) var(--ease-out);
}
.md-subs.is-open { grid-template-rows: 1fr; }
.md-subs__inner { overflow: hidden; }
.md-subs__list {
  display: flex;
  flex-direction: column;
  margin: 4px 0 6px 17px;
  padding-left: 14px;
  border-left: 1px solid var(--border-2);
}
.md-sub {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 9px;
  border-radius: var(--r-sm);
  cursor: pointer;
  text-align: left;
  background: transparent;
  border: 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--fg-3);
  transition: all var(--dur-fast) var(--ease-out);
  position: relative;
}
.md-sub::before {
  content: "";
  position: absolute;
  left: -15px; top: 50%;
  width: 10px; height: 1px;
  background: var(--border-2);
}
.md-sub__num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-4);
  width: 12px;
}
.md-sub:hover { color: var(--fg-1); background: var(--bg-elevated); }
.md-sub.is-sel {
  color: var(--eng-color, var(--green-500));
  background: color-mix(in srgb, var(--eng-color, #1aff66) 7%, transparent);
}
.md-sub.is-sel .md-sub__num { color: var(--eng-color, var(--green-500)); }
.md-sub.is-sel::before { background: var(--eng-color, var(--green-500)); }
.md-sub__tag {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  color: var(--fg-4);
}
.md-sub.is-sel .md-sub__tag { color: var(--eng-color); }

/* ============================================================
   3b — RIGHT RAIL : QUICK PICKS (rotating)
   ============================================================ */
.md-qp {
  background: var(--bg-base);
  border: 1px solid var(--border-1);
  border-radius: var(--r-md);
  padding: 12px;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.md-qp__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.md-qp__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-2);
}
.md-qp__live {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--green-500);
}
.md-qp__stack {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
  overflow: hidden;
}
.md-qp__card {
  flex: 1 1 0;
  min-height: 0;
  overflow: hidden;
  position: relative;
  border-radius: var(--r-md);
  padding: 8px 11px 9px;
  background: var(--bg-raised);
  box-shadow: 0 0 0 1.5px var(--qp-color, var(--green-500)), 0 0 14px var(--qp-glow, rgba(26,255,102,0.14));
  display: flex;
  flex-direction: column;
  gap: 7px;
  cursor: pointer;
  animation: md-qp-in var(--dur-slow) var(--ease-out) both;
  transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
}
.md-qp__card:hover { transform: translateY(-1px); box-shadow: 0 0 0 1.5px var(--qp-color, var(--green-500)), 0 0 22px var(--qp-glow, rgba(26,255,102,0.14)); }
.md-qp__card:focus-visible { outline: 2px solid var(--qp-color, var(--green-500)); outline-offset: 2px; }
.md-qp__add {
  position: absolute; bottom: 8px; right: 9px; z-index: 2;
  font-family: var(--font-display); font-weight: 800; font-size: 8px; letter-spacing: 0.06em;
  color: #04140a; background: var(--qp-color, var(--green-500)); border-radius: 3px; padding: 2px 5px;
  opacity: 0; transform: translateY(2px); transition: all .14s ease; pointer-events: none;
  box-shadow: 0 0 10px var(--qp-glow, rgba(26,255,102,0.3));
}
.md-qp__card:hover .md-qp__add, .md-qp__card:focus-visible .md-qp__add { opacity: 1; transform: translateY(0); }
@keyframes md-qp-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.md-qp__row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.md-qp__label {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--qp-color, var(--green-500));
}
.md-qp__score {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-3);
  white-space: nowrap;
}
.md-qp__score b {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 13px;
  color: var(--qp-color, var(--green-500));
  margin-left: 5px;
}
.md-qp__heads { display: grid; gap: 6px; justify-items: center; }
.md-strat-head { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 0; width: 100%; }
.md-strat-head image-slot {
  display: block; width: 100%; max-width: 40px; height: 40px; border-radius: 50%;
  box-shadow: 0 0 0 2px var(--team, #3b6fff), 0 0 12px -3px var(--team, #3b6fff);
  font-size: 10px;
}
.md-strat-head__name {
  font-family: var(--font-display); font-weight: 700; font-size: 8.5px; letter-spacing: 0.04em;
  color: var(--fg-2); text-transform: uppercase; max-width: 100%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.md-qp__count { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.md-qp__count-lbl { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.16em; color: var(--fg-4); text-transform: uppercase; }
.md-qp__count-field { position: relative; display: flex; align-items: center; flex: 1; max-width: 124px; }
.md-qp__count-field select {
  appearance: none; -webkit-appearance: none; width: 100%; background: #0a1014;
  border: 1px solid rgba(180,220,200,0.16); border-radius: 6px; color: var(--fg-1);
  font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.04em;
  padding: 6px 26px 6px 10px; cursor: pointer; outline: none; transition: border-color .14s ease;
}
.md-qp__count-field select:hover { border-color: rgba(26,255,102,0.4); }
.md-qp__count-field select:focus { border-color: var(--green-500); box-shadow: 0 0 0 1px rgba(26,255,102,0.4); }
.md-qp__count-field svg { position: absolute; right: 8px; color: var(--fg-3); pointer-events: none; }
.md-qp__count-field option { background: #0a1014; color: var(--fg-1); }
.md-qp__tag {
  font-family: var(--font-body);
  font-size: 10.5px;
  color: var(--fg-2);
  text-align: center;
}
.md-qp__viewall {
  background: transparent;
  border: 0;
  padding: 0;
  color: var(--green-500);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: right;
  cursor: pointer;
  white-space: nowrap;
}
.md-qp__toprow { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.md-qp__viewall:hover { text-shadow: var(--text-glow-green); }

/* ============================================================
   JIG BUILDER (room body)
   ============================================================ */
.md-jig {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  max-width: 880px;
}
.md-jig__config, .md-jig__preview {
  background: var(--bg-raised);
  border: 1px solid var(--border-1);
  border-radius: var(--r-md);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.md-jig__sec {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-3);
}
.md-jig__leg {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-base);
  border-radius: var(--r-sm);
  box-shadow: inset 0 0 0 1px var(--border-1);
}
.md-jig__leg-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green-500); box-shadow: 0 0 7px var(--green-glow);
  flex-shrink: 0;
}
.md-jig__leg-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--fg-1);
}
.md-jig__leg-team {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
}
.md-jig__leg-score {
  margin-left: auto;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  color: var(--green-500);
}
.md-jig__combined {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  padding: 12px;
  border-radius: var(--r-sm);
  background: rgba(26,255,102,0.06);
  box-shadow: inset 0 0 0 1px rgba(26,255,102,0.3);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-2);
}
.md-jig__combined b {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 24px;
  color: var(--green-500);
  text-shadow: var(--text-glow-green);
}

/* generic baseball headshot avatar */
.md-head {
  flex: 1;
  aspect-ratio: 1 / 0.92;
  border-radius: var(--r-sm);
  background: linear-gradient(180deg, #1a232a, #0c1318);
  box-shadow: inset 0 0 0 1px var(--border-2);
  position: relative;
  overflow: hidden;
}
.md-head svg { position: absolute; inset: 0; width: 100%; height: 100%; }

/* ============================================================
   STAGE-SCOPED TACTICAL COMMAND CENTER
   Renders inside the stage; shell stays visible.
   ============================================================ */
.md-cc {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}
.md-cc__bar {
  position: sticky;
  top: 0;
  z-index: 9;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 13px 18px;
  background: linear-gradient(180deg, rgba(255,51,68,0.05), rgba(10,16,20,0.96));
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border-1);
}
.md-cc__bar::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,51,68,0.7) 30%, rgba(255,51,68,0.7) 70%, transparent);
  box-shadow: 0 0 12px rgba(255,51,68,0.5);
}
.md-cc__titlewrap { display: flex; align-items: center; gap: 12px; min-width: 0; }
.md-cc__logo { display: inline-flex; filter: drop-shadow(0 0 6px currentColor); }
.md-cc__title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-1);
  white-space: nowrap;
}
.md-cc__ctx {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-3);
  padding: 5px 10px;
  border-radius: var(--r-pill);
  background: color-mix(in srgb, var(--ctx-color, #00d9ff) 8%, transparent);
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ctx-color, #00d9ff) 40%, transparent);
  white-space: nowrap;
}
.md-cc__ctx b { color: var(--ctx-color, var(--cyan-300)); font-weight: 800; }
.md-cc__baractions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.md-cc__filters {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--green-500);
  white-space: nowrap;
}
.md-cc__close {
  width: 30px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-elevated);
  border: 1px solid var(--border-2);
  border-radius: var(--r-sm);
  color: var(--fg-2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.md-cc__close:hover { color: var(--red-500); border-color: rgba(255,51,68,0.5); background: rgba(255,51,68,0.08); }

.md-cc__filters {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;

.fsm-player__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
.fsm-player__col { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.fsm-player__name {
  font-family: var(--font-display); font-weight: 600; font-size: 12.5px; letter-spacing: 0.02em;
  color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fsm-player__meta {
  font-family: var(--font-display); font-weight: 600; font-size: 9px; letter-spacing: 0.1em;
  color: var(--fg-3); text-transform: uppercase; display: flex; align-items: center; gap: 4px;
}
.fsm-player__bar { color: rgba(180,220,200,0.25); font-style: normal; }
.fsm-player__game {
  font-family: var(--font-display); font-weight: 600; font-size: 8.5px; letter-spacing: 0.08em;
  color: var(--cyan-500, #00d9ff); text-transform: uppercase; display: flex; align-items: center; gap: 4px;
  margin-top: 1px; white-space: nowrap;
}

/* matchup (clickable → pitch mix analysis) */
.fsm-matchup { vertical-align: middle; padding: 5px 10px 5px 6px; }
.fsm-matchup__in {
  display: flex; align-items: center; gap: 9px; width: 100%;
  background: transparent; border: 0; margin: 0; padding: 4px 5px; cursor: pointer;
  font: inherit; color: inherit; text-align: left; border-radius: 5px; transition: background .12s ease;
}
.fsm-matchup__in:hover { background: rgba(180,220,200,0.08); }
.fsm-matchup__in:hover .fsm-pie { transform: scale(1.1); box-shadow: 0 0 0 1px rgba(255,255,255,0.25), 0 0 10px rgba(0,0,0,0.6); }
.fsm-matchup__in:focus-visible { outline: 2px solid var(--green-500); outline-offset: 1px; }
.fsm-pie { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(0,0,0,0.55), 0 0 9px -3px rgba(0,0,0,0.7); transition: transform .12s ease, box-shadow .12s ease; }
.fsm-matchup__label {
  display: flex; flex-direction: column; line-height: 1.06; font-family: var(--font-display);
  font-weight: 700; font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase;
}
.fsm-matchup__sub { font-weight: 600; font-size: 8px; opacity: 0.72; }

/* heatmap data cells */
.fsm-cell { text-align: center; padding: 5px 4px; font-size: 12px; white-space: nowrap; color: var(--fg-2); vertical-align: middle; }
/* column separators so adjacent same-color cells don't blend across columns */
.fsm-table th, .fsm-table td { border-right: 1px solid rgba(2,5,8,0.6); }
.fsm-table th:last-child, .fsm-table td:last-child { border-right: 0; }
.fsm-cell.is-elite  { background: #0e3a20; color: #1aff66; font-weight: 700; box-shadow: inset 0 0 0 1px rgba(26,255,102,0.16); }
.fsm-cell.is-strong { background: #14291a; color: #6dffae; }
.fsm-cell.is-avg    { background: transparent; color: #b8c2c0; }
.fsm-cell.is-weak   { background: #3d0a10; color: #ff8a93; }
.fsm-cell.is-danger { background: #2a0a10; color: #ff3344; font-weight: 700; box-shadow: inset 0 0 0 1px rgba(255,51,68,0.2); }
.fsm-cell.is-na     { color: var(--fg-4); }
.fsm-cell--neutral  { color: var(--fg-2); }
.fsm-cell--headline { color: var(--fg-1); font-weight: 700; background: rgba(180,220,200,0.035); }

/* game information band + per-game block */
.fsm-gameband, .fsm-gameblock { display: flex; flex-direction: column; gap: 6px; }
.fsm-gameblock { scroll-margin-top: 8px; }
.fsm-game {
  display: flex; align-items: center; gap: 14px; padding: 9px 14px;
  background: linear-gradient(90deg, rgba(26,255,102,0.06), rgba(14,21,25,0.6) 62%);
  border: 1px solid rgba(180,220,200,0.1); border-radius: 6px;
}
.fsm-game__match { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 800; font-size: 15px; letter-spacing: 0.06em; color: var(--fg-1); }
.fsm-game__match span { color: var(--fg-4); font-weight: 600; }
.fsm-game__meta { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); text-transform: uppercase; }
.fsm-game__meta i { width: 1px; height: 11px; background: rgba(180,220,200,0.18); }
.fsm-game__factor { font-family: var(--font-mono); color: var(--fg-2); }
.fsm-game__factor.is-hot { color: var(--green-500); }
.fsm-game__factor.is-cold { color: var(--red-300); }
.fsm-game__count { margin-left: auto; font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.12em; color: var(--fg-2); padding: 3px 9px; border: 1px solid rgba(180,220,200,0.14); border-radius: 4px; }

/* status bar */
.fsm-statusbar {
  display: flex; align-items: center; gap: 9px; flex-wrap: wrap; padding: 9px 12px;
  background: var(--bg-base); border: 1px solid rgba(180,220,200,0.08); border-radius: 6px;
  font-family: var(--font-display); font-weight: 600; font-size: 9.5px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--fg-3);
}
.fsm-statusbar i { width: 1px; height: 10px; background: rgba(180,220,200,0.16); }
.fsm-statusbar b { font-weight: 800; }
.fsm-statusbar b.ok { color: var(--green-500); }
.fsm-status__sys { color: var(--fg-1); font-weight: 800; letter-spacing: 0.12em; }
.fsm-status__src { margin-left: auto; color: var(--fg-4); }

/* ---- detail modal: batter card + pitch mix ---- */
.fsm-modal {
  position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: 24px; background: rgba(2,5,8,0.74); backdrop-filter: blur(3px);
  animation: fsm-fade .16s ease;
}
@keyframes fsm-fade { from { opacity: 0; } to { opacity: 1; } }
.fsm-modal__inner { animation: fsm-pop .18s cubic-bezier(.2,.9,.3,1.1); }
@keyframes fsm-pop { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }

.fsm-card {
  width: 560px; max-width: 92vw; max-height: 88vh; overflow: auto;
  background: var(--bg-base); border: 1px solid rgba(180,220,200,0.16); border-radius: 10px;
  box-shadow: 0 24px 70px -20px rgba(0,0,0,0.85), 0 0 0 1px rgba(0,0,0,0.4);
}
.fsm-card__head {
  display: flex; align-items: center; gap: 14px; padding: 16px 16px 14px;
  border-bottom: 1px solid rgba(180,220,200,0.1);
  background: linear-gradient(180deg, rgba(26,255,102,0.04), transparent);
}
.fsm-tier--lg {
  flex-direction: row; gap: 8px; width: auto; padding: 9px 13px; cursor: default;
}
.fsm-tier--lg .fsm-tier__icon svg { width: 22px; height: 22px; }
.fsm-tier--lg .fsm-tier__label { font-size: 13px; }
.fsm-card__id { flex: 1; min-width: 0; }
.fsm-card__kicker { font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.18em; color: var(--green-500); text-transform: uppercase; margin-bottom: 3px; }
.fsm-card__name { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: 0.02em; color: var(--fg-1); line-height: 1.05; }
.fsm-card__throws { font-size: 12px; font-weight: 600; color: var(--fg-3); letter-spacing: 0.06em; }
.fsm-card__meta { font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.08em; color: var(--fg-3); text-transform: uppercase; margin-top: 4px; }
.fsm-card__prob { display: flex; flex-direction: column; align-items: flex-end; }
.fsm-card__probval { font-family: var(--font-mono); font-weight: 700; font-size: 26px; line-height: 1; font-variant-numeric: tabular-nums; }
.fsm-card__problbl { font-family: var(--font-display); font-weight: 700; font-size: 8px; letter-spacing: 0.14em; color: var(--fg-4); text-transform: uppercase; margin-top: 3px; }
.fsm-card__close {
  align-self: flex-start; width: 28px; height: 28px; flex-shrink: 0; border-radius: 6px;
  background: transparent; border: 1px solid rgba(180,220,200,0.16); color: var(--fg-3);
  font-size: 13px; cursor: pointer; transition: all .14s ease;
}
.fsm-card__close:hover { color: var(--fg-1); border-color: var(--red-300); background: rgba(255,51,68,0.08); }

.fsm-card__matchup {
  display: flex; align-items: center; gap: 12px; padding: 13px 16px;
  border-bottom: 1px solid rgba(180,220,200,0.08); background: rgba(8,12,16,0.4);
}
.fsm-pie--lg { width: 34px; height: 34px; }
.fsm-card__mtext { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.fsm-card__mq { font-family: var(--font-display); font-weight: 800; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
.fsm-card__msub { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); letter-spacing: 0.02em; }
.fsm-card__pitchbtn {
  font-family: var(--font-display); font-weight: 700; font-size: 10.5px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--green-500); background: rgba(26,255,102,0.08);
  border: 1px solid rgba(26,255,102,0.4); border-radius: 6px; padding: 8px 12px; cursor: pointer;
  white-space: nowrap; transition: all .14s ease;
}
.fsm-card__pitchbtn:hover { background: rgba(26,255,102,0.16); box-shadow: 0 0 14px rgba(26,255,102,0.25); }

.fsm-card__sec { padding: 13px 16px; border-bottom: 1px solid rgba(180,220,200,0.06); }
.fsm-card__sectitle { font-family: var(--font-display); font-weight: 700; font-size: 9.5px; letter-spacing: 0.16em; color: var(--fg-4); text-transform: uppercase; margin-bottom: 10px; }
.fsm-card__stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(78px, 1fr)); gap: 8px; }
.fsm-stat { display: flex; flex-direction: column; gap: 3px; padding: 8px 9px; background: var(--bg-raised); border: 1px solid rgba(180,220,200,0.07); border-radius: 6px; }
.fsm-stat__l { font-family: var(--font-display); font-weight: 700; font-size: 8.5px; letter-spacing: 0.1em; color: var(--fg-4); text-transform: uppercase; }
.fsm-stat__v { font-family: var(--font-mono); font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }

.fsm-card__foot {
  display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 16px;
  background: rgba(8,12,16,0.5);
}
.fsm-card__env { font-family: var(--font-display); font-weight: 600; font-size: 9.5px; letter-spacing: 0.08em; color: var(--fg-4); text-transform: uppercase; }
.fsm-card__fd {
  font-family: var(--font-display); font-weight: 800; font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: #04140a; background: var(--green-500); border-radius: 6px;
  padding: 9px 16px; text-decoration: none; white-space: nowrap; transition: all .14s ease;
  box-shadow: 0 0 16px rgba(26,255,102,0.3);
}
.fsm-card__fd:hover { background: #3dff80; box-shadow: 0 0 22px rgba(26,255,102,0.5); }

/* pitch mix table */
.fsm-pitch { padding: 6px 16px 14px; }
.fsm-pitch__hd, .fsm-pitch__row {
  display: grid; grid-template-columns: 1.5fr 1.4fr 0.7fr 0.7fr 0.8fr 0.6fr 0.9fr; gap: 8px; align-items: center;
}
.fsm-pitch__hd { padding: 10px 4px 8px; border-bottom: 1px solid rgba(180,220,200,0.12); }
.fsm-pitch__hd span { font-family: var(--font-display); font-weight: 700; font-size: 8.5px; letter-spacing: 0.1em; color: var(--fg-4); text-transform: uppercase; text-align: right; }
.fsm-pitch__hd span:first-child, .fsm-pitch__hd span:nth-child(2) { text-align: left; }
.fsm-pitch__hd span:last-child { text-align: center; }
.fsm-pitch__row { padding: 9px 4px; border-bottom: 1px solid rgba(180,220,200,0.05); font-family: var(--font-mono); }
.fsm-pitch__type { display: flex; align-items: center; gap: 7px; }
.fsm-pitch__type b { font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--fg-1); background: var(--bg-elevated); border-radius: 4px; padding: 3px 6px; box-shadow: inset 0 0 0 1px rgba(180,220,200,0.12); }
.fsm-pitch__type span { font-family: var(--font-display); font-weight: 600; font-size: 11px; color: var(--fg-2); letter-spacing: 0.04em; }
.fsm-pitch__usage { display: flex; align-items: center; gap: 7px; }
.fsm-pitch__bar { height: 7px; border-radius: 4px; background: linear-gradient(90deg, var(--green-700), var(--green-500)); box-shadow: 0 0 8px rgba(26,255,102,0.3); min-width: 4px; }
.fsm-pitch__usage i { font-style: normal; font-size: 11px; color: var(--fg-2); min-width: 30px; }
.fsm-pitch__num { text-align: right; font-size: 12px; color: var(--fg-2); font-variant-numeric: tabular-nums; }
.fsm-pitch__verdict { text-align: center; font-family: var(--font-display); font-weight: 800; font-size: 9px; letter-spacing: 0.08em; padding: 4px 6px; border-radius: 4px; }
.fsm-pitch__read {
  margin: 0 16px 14px; padding: 10px 12px; border-radius: 6px; background: rgba(8,12,16,0.6);
  border: 1px solid rgba(180,220,200,0.08); font-family: var(--font-display); font-weight: 600;
  font-size: 11px; letter-spacing: 0.06em; color: var(--fg-3); text-transform: uppercase;
}
.fsm-pitch__read b { font-weight: 800; }

/* ---- head-to-head matchup card ---- */
.fsm-card--h2h { width: 884px; position: relative; padding: 0; }
.fsm-card__close--abs { position: absolute; top: 12px; right: 12px; z-index: 6; background: rgba(8,12,16,0.7); }
.fsm-h2h__top { display: grid; grid-template-columns: 1fr 0.94fr 1fr; }

.fsm-h2h__side {
  position: relative; padding: 16px 14px 14px; display: flex; flex-direction: column; gap: 11px;
  background:
    linear-gradient(180deg, rgba(4,7,10,0) 40%, rgba(4,7,10,0.55)),
    radial-gradient(120% 75% at 50% -12%, var(--tc), transparent 68%);
}
.fsm-h2h__side::after {
  content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
  background: repeating-linear-gradient(115deg, transparent 0 13px, rgba(255,255,255,0.012) 13px 14px);
}
.fsm-h2h__nameblock { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
.fsm-h2h__side--right .fsm-h2h__nameblock { align-items: flex-end; text-align: right; }
.fsm-h2h__team { font-family: var(--font-display); font-weight: 800; font-size: 11px; letter-spacing: 0.16em; color: var(--tc); text-shadow: 0 0 10px var(--tc); }
.fsm-h2h__name { font-family: var(--font-display); font-weight: 800; font-size: 19px; line-height: 1.04; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); text-transform: uppercase; }
.fsm-h2h__badge { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.1em; color: var(--tc); border: 1px solid var(--tc); border-radius: 3px; padding: 2px 6px; }
.fsm-h2h__portrait {
  position: relative; z-index: 1; height: 104px; border-radius: 8px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 50% 38%, var(--tc), rgba(4,7,10,0.92) 72%);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), inset 0 -34px 44px -22px rgba(0,0,0,0.75);
}
.fsm-h2h__portrait span { font-family: var(--font-display); font-weight: 800; font-size: 46px; color: rgba(255,255,255,0.94); text-shadow: 0 3px 14px rgba(0,0,0,0.6); letter-spacing: 0.02em; }
.fsm-h2h__rail { position: relative; z-index: 1; background: rgba(8,12,16,0.55); border: 1px solid rgba(180,220,200,0.08); border-radius: 6px; overflow: hidden; }
.fsm-h2h__railtitle { font-family: var(--font-display); font-weight: 700; font-size: 8.5px; letter-spacing: 0.12em; color: var(--fg-4); text-transform: uppercase; padding: 7px 9px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(180,220,200,0.07); }
.fsm-h2h__railrow { display: flex; align-items: center; justify-content: space-between; padding: 4.5px 9px; border-bottom: 1px solid rgba(180,220,200,0.04); }
.fsm-h2h__railrow:last-child { border-bottom: 0; }
.fsm-h2h__railrow span { font-family: var(--font-display); font-weight: 600; font-size: 9.5px; letter-spacing: 0.06em; color: var(--fg-3); text-transform: uppercase; }
.fsm-h2h__railrow b { font-family: var(--font-mono); font-weight: 700; font-size: 11.5px; color: var(--fg-1); font-variant-numeric: tabular-nums; }
.fsm-h2h__tier { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 8px 11px; background: rgba(8,12,16,0.55); border: 1px solid rgba(180,220,200,0.1); border-radius: 6px; }
.fsm-h2h__tier span { font-family: var(--font-display); font-weight: 700; font-size: 8.5px; letter-spacing: 0.12em; color: var(--fg-4); text-transform: uppercase; }
.fsm-h2h__tier b { font-family: var(--font-display); font-weight: 800; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; text-shadow: 0 0 8px currentColor; }

.fsm-h2h__center { padding: 16px 14px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: rgba(4,7,10,0.55); border-left: 1px solid rgba(180,220,200,0.07); border-right: 1px solid rgba(180,220,200,0.07); }
.fsm-h2h__ctitle { text-align: center; font-family: var(--font-display); font-weight: 800; font-size: 14px; letter-spacing: 0.1em; color: #fff; text-transform: uppercase; }
.fsm-h2h__ctitle span { display: block; font-weight: 600; font-size: 8.5px; letter-spacing: 0.16em; color: var(--fg-3); margin-top: 3px; }
.fsm-h2h__zone { display: grid; grid-template-columns: repeat(3, 56px); grid-auto-rows: 42px; gap: 5px; }
.fsm-zcell { display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-weight: 700; font-size: 14px; border-radius: 5px; font-variant-numeric: tabular-nums; }
.fsm-zcell.is-elite  { background: rgba(14,58,32,0.7);  color: #1aff66; box-shadow: inset 0 0 0 1.5px rgba(26,255,102,0.6), 0 0 12px -4px rgba(26,255,102,0.5); }
.fsm-zcell.is-strong { background: rgba(20,41,26,0.7);  color: #6dffae; box-shadow: inset 0 0 0 1.5px rgba(109,255,174,0.4); }
.fsm-zcell.is-avg    { background: rgba(22,28,24,0.7);  color: #d8e0dc; box-shadow: inset 0 0 0 1.5px rgba(180,220,200,0.18); }
.fsm-zcell.is-weak   { background: rgba(61,10,16,0.7);  color: #ff8a93; box-shadow: inset 0 0 0 1.5px rgba(255,138,147,0.45); }
.fsm-zcell.is-danger { background: rgba(42,10,16,0.7);  color: #ff3344; box-shadow: inset 0 0 0 1.5px rgba(255,51,68,0.6), 0 0 12px -4px rgba(255,51,68,0.5); }
.fsm-h2h__edge { text-align: center; display: flex; flex-direction: column; gap: 1px; }
.fsm-h2h__edgelbl { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.14em; color: var(--fg-4); text-transform: uppercase; }
.fsm-h2h__edge b { font-family: var(--font-mono); font-weight: 700; font-size: 22px; line-height: 1.1; }
.fsm-h2h__edgeside { font-family: var(--font-display); font-weight: 700; font-size: 9px; letter-spacing: 0.12em; color: var(--fg-3); text-transform: uppercase; }
.fsm-h2h__h2h { width: 100%; }
.fsm-h2h__h2htitle { text-align: center; font-family: var(--font-display); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; color: var(--fg-2); text-transform: uppercase; }
.fsm-h2h__h2htitle span { color: var(--fg-4); font-weight: 600; }
.fsm-h2h__h2hstrip { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 8px; }
.fsm-h2h__h2hstrip > div { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 2px; background: rgba(8,12,16,0.6); border: 1px solid rgba(180,220,200,0.07); border-radius: 5px; }
.fsm-h2h__h2hstrip span { font-family: var(--font-display); font-weight: 700; font-size: 8px; letter-spacing: 0.06em; color: var(--fg-4); }
.fsm-h2h__h2hstrip b { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--fg-1); font-variant-numeric: tabular-nums; }
.fsm-h2h__btier { display: flex; gap: 6px; width: 100%; }
.fsm-h2h__btier > div { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 6px; background: rgba(8,12,16,0.6); border: 1px solid rgba(180,220,200,0.08); border-radius: 6px; }
.fsm-h2h__btier span { font-family: var(--font-display); font-weight: 700; font-size: 8px; letter-spacing: 0.1em; color: var(--fg-4); text-transform: uppercase; }
.fsm-h2h__btier b { font-family: var(--font-mono); font-weight: 700; font-size: 17px; color: var(--fg-1); }

.fsm-h2h__tables { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px; border-top: 1px solid rgba(180,220,200,0.08); }
